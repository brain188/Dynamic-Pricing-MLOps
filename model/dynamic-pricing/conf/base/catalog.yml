# Here you can define all your datasets by using simple YAML syntax.
#
# Documentation for this file format can be found in "The Data Catalog"
# Link: https://docs.kedro.org/en/stable/catalog-data/introduction/#data-catalog


# DATA PROCESSING ------------------------------------------------------------------------------------

# ---------------------------------------------------------------------
# INPUT — the original historical dataset, untouched.
# ---------------------------------------------------------------------
raw_ride_data:
  type: pandas.CSVDataset
  filepath: data/01_raw/dynamic_pricing.csv
  metadata:
    kedro-viz:
      layer: raw


# INTERMEDIATE OUTPUTS 

validated_ride_data:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/validated_ride_data.parquet
  metadata:
    kedro-viz:
      layer: intermediate

deduplicated_ride_data:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/deduplicated_ride_data.parquet
  metadata:
    kedro-viz:
      layer: intermediate

imputed_ride_data:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/imputed_ride_data.parquet
  metadata:
    kedro-viz:
      layer: intermediate

range_validated_ride_data:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/range_validated_ride_data.parquet
  metadata:
    kedro-viz:
      layer: intermediate

# ---------------------------------------------------------------------
# OUTPUT — the clean, validated dataset consumed by feature_engineering.
# ---------------------------------------------------------------------
cleaned_ride_data:
  type: pandas.ParquetDataset
  filepath: data/03_primary/cleaned_ride_data.parquet
  metadata:
    kedro-viz:
      layer: primary

# ---------------------------------------------------------------------
# REPORTING — auditable record of what validate_value_ranges removed and
# why. Not consumed by any downstream pipeline; this is for humans
# (and, later, the monitoring pipeline) to review.
# ---------------------------------------------------------------------
data_quality_report:
  type: pandas.CSVDataset
  filepath: data/08_reporting/data_processing_quality_report.csv
  metadata:
    kedro-viz:
      layer: reporting


# FEATURE ENGINEERING -----------------------------------------------------------------------------------


# ---------------------------------------------------------------------
# INTERMEDIATE OUTPUTS — one per node, same rationale as data_processing:
# ---------------------------------------------------------------------
data_with_ratio:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/data_with_ratio.parquet
  metadata:
    kedro-viz:
      layer: intermediate

encoded_ride_data:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/encoded_ride_data.parquet
  metadata:
    kedro-viz:
      layer: intermediate

# ---------------------------------------------------------------------
# FEATURE STORE ARTIFACT — the fitted OneHotEncoder. This is the object
# that guarantees training and inference compute features identically.
# Persisted with Kedro's pickle dataset so it can be loaded, unchanged,
# by the inference pipeline and (eventually) the FastAPI backend.
# ---------------------------------------------------------------------
categorical_encoder:
  type: pickle.PickleDataset
  filepath: data/04_feature/categorical_encoder.pickle
  metadata:
    kedro-viz:
      layer: feature

# ---------------------------------------------------------------------
# OUTPUT — the final, model-ready feature table.
# ---------------------------------------------------------------------
feature_table:
  type: pandas.ParquetDataset
  filepath: data/04_feature/feature_table.parquet
  metadata:
    kedro-viz:
      layer: feature


# TRAINING ----------------------------------------------------------------------------------------------

# ---------------------------------------------------------------------
# Individual trained model artifacts.
# ---------------------------------------------------------------------
baseline_model:
  type: pickle.PickleDataset
  filepath: data/06_models/baseline_model.pickle
  metadata:
    kedro-viz:
      layer: models

random_forest_model:
  type: pickle.PickleDataset
  filepath: data/06_models/random_forest_model.pickle
  metadata:
    kedro-viz:
      layer: models

lightgbm_model:
  type: pickle.PickleDataset
  filepath: data/06_models/lightgbm_model.pickle
  metadata:
    kedro-viz:
      layer: models

xgboost_model:
  type: pickle.PickleDataset
  filepath: data/06_models/xgboost_model.pickle
  metadata:
    kedro-viz:
      layer: models

catboost_model:
  type: pickle.PickleDataset
  filepath: data/06_models/catboost_model.pickle
  metadata:
    kedro-viz:
      layer: models

trained_models:
  type: pickle.PickleDataset
  filepath: data/06_models/trained_models.pickle
  metadata:
    kedro-viz:
      layer: models

# ---------------------------------------------------------------------
# The model comparison table
# ---------------------------------------------------------------------
model_comparison_table:
  type: pandas.CSVDataset
  filepath: data/08_reporting/model_comparison_table.csv
  metadata:
    kedro-viz:
      layer: reporting

# ---------------------------------------------------------------------
# Final training summary: which model won, its registry version, and its
# metrics. Saved as JSON for easy consumption by the backend
# ---------------------------------------------------------------------
training_summary:
  type: json.JSONDataset
  filepath: data/08_reporting/training_summary.json
  metadata:
    kedro-viz:
      layer: reporting
