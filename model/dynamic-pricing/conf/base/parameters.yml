data_processing:

  # ---------------------------------------------------------------------
  # Expected schema: column name -> expected pandas dtype (as a string).
  # Used by `validate_schema` to fail fast if the raw data's structure
  # ever drifts from what the pipeline was built against.
  # ---------------------------------------------------------------------
  expected_schema:
    Number_of_Riders: int64
    Number_of_Drivers: int64
    Location_Category: object
    Customer_Loyalty_Status: object
    Number_of_Past_Rides: int64
    Average_Ratings: float64
    Time_of_Booking: object
    Vehicle_Type: object
    Expected_Ride_Duration: int64
    Historical_Cost_of_Ride: float64

  # ---------------------------------------------------------------------
  # Duplicate handling. `null` (None) means: check duplicates across ALL
  # columns (an exact full-row match). Set to a list of column names to
  # narrow the duplicate definition instead.
  # ---------------------------------------------------------------------
  duplicate_subset: null

  # ---------------------------------------------------------------------
  # Missing value strategy per column. Any column not listed here falls
  # back to "drop_row" by default (see `handle_missing_values`).
  #
  # The historical dataset had zero missing values at EDA time, so these
  # strategies are a safety net for future data refreshes, not a fix for
  # a known problem today.
  # ---------------------------------------------------------------------
  missing_value_strategy:
    Number_of_Riders: median
    Number_of_Drivers: median
    Number_of_Past_Rides: median
    Average_Ratings: median
    Expected_Ride_Duration: median
    Location_Category: mode
    Customer_Loyalty_Status: mode
    Time_of_Booking: mode
    Vehicle_Type: mode
    Historical_Cost_of_Ride: drop_row  # never impute the prediction target

  # ---------------------------------------------------------------------
  # Sane value ranges per column, used by `validate_value_ranges` to catch
  # corrupt or nonsensical rows. Bounds are set from the EDA describe()
  # output with a small safety margin, not the exact observed min/max, so
  # legitimate new data isn't rejected for being slightly outside the
  # historical sample's range.
  # ---------------------------------------------------------------------
  value_ranges:
    Number_of_Riders:
      min: 0
      max: 500
    Number_of_Drivers:
      min: 0
      max: 500
    Number_of_Past_Rides:
      min: 0
      max: 1000
    Average_Ratings:
      min: 1.0
      max: 5.0
    Expected_Ride_Duration:
      min: 0
      max: 600
    Historical_Cost_of_Ride:
      min: 0
      max: 5000

  # ---------------------------------------------------------------------
  # Final dtypes enforced right before handing off to feature_engineering.
  # ---------------------------------------------------------------------
  final_dtypes:
    Number_of_Riders: int64
    Number_of_Drivers: int64
    Location_Category: category
    Customer_Loyalty_Status: category
    Number_of_Past_Rides: int64
    Average_Ratings: float64
    Time_of_Booking: category
    Vehicle_Type: category
    Expected_Ride_Duration: int64
    Historical_Cost_of_Ride: float64


feature_engineering:

  # ---------------------------------------------------------------------
  # Demand-supply ratio engineering. EDA found ~7% outliers in this ratio
  # by the IQR method, driven by rows with very low driver counts, hence
  # the outlier cap rather than leaving the raw ratio unbounded.
  # ---------------------------------------------------------------------
  demand_supply_ratio:
    numerator_column: Number_of_Riders
    denominator_column: Number_of_Drivers
    outlier_cap_percentile: 0.99  # values above the 99th percentile are capped, not removed

  # ---------------------------------------------------------------------
  # Categorical columns to one-hot encode. All four categoricals are kept
  # despite Location_Category, Time_of_Booking, and Customer_Loyalty_Status
  # showing weak importance in both the impurity-based and permutation
  # importance checks.
  # ---------------------------------------------------------------------
  categorical_columns:
    - Location_Category
    - Customer_Loyalty_Status
    - Time_of_Booking
    - Vehicle_Type

  # ---------------------------------------------------------------------
  # OneHotEncoder configuration.
  #   handle_unknown: "ignore" -> a category never seen during training
  #     (e.g. a new Location_Category value in future data) is encoded as
  #     all-zeros at inference time instead of raising an error. This
  #     matters because the inference pipeline reuses this exact fitted
  #     encoder and must not crash on unexpected-but-plausible input.
  #   drop: "first" -> drops one level per categorical column to avoid
  #     perfect multicollinearity, which matters for the Linear Regression
  #     baseline model even though tree-based models are unaffected by it.
  # ---------------------------------------------------------------------
  encoder:
    handle_unknown: ignore
    drop: first

  # ---------------------------------------------------------------------
  # The prediction target. Kept in the feature table for the training
  # pipeline; the inference pipeline drops this column before scoring.
  # ---------------------------------------------------------------------
  target_column: Historical_Cost_of_Ride
